# docker-compose.yml - Roadmap App
# Configuração completa para produção com MySQL

version: '3.8'

services:
  # Aplicação NestJS
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: roadmap-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=mysql://mysql:61ebffc6e00b52add90f@app_database_roadmap:3306/roadmap_db
      - JWT_SECRET=roadmap_app_jwt_secret_key_2025_production_must_be_very_secure_and_long_enough_for_security
      - JWT_EXPIRES_IN=7d
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - roadmap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Banco de Dados MySQL
  mysql:
    image: mysql:8.0
    container_name: roadmap-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=fdac5598738543f51757
      - MYSQL_DATABASE=roadmap_db
      - MYSQL_USER=mysql
      - MYSQL_PASSWORD=61ebffc6e00b52add90f
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - roadmap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfdac5598738543f51757"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  # Redis para Cache (Opcional)
  redis:
    image: redis:7-alpine
    container_name: roadmap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - roadmap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  roadmap-network:
    driver: bridge
