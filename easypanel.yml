# easypanel.yml - Configuração para EasyPanel
# Deploy do Roadmap App - Versão simplificada para EasyPanel

name: roadmap-app
description: "Sistema de Gamificação de Aprendizado - Roadmap App"

services:
  # Aplicação Principal
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=*
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
